<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Oracle</title>
    <style>
        body { text-align: center; font-family: sans-serif; padding: 20px; background: #0d1117; color: white; }
        
        /* Overall text is now bigger and easier to read */
        h1 { font-size: 28px; }
        p { font-size: 18px; color: #8b949e; }

        input { padding: 15px; width: 80%; font-size: 20px; border-radius: 8px; border: 1px solid #30363d; background: #161b22; color: white; margin-bottom: 20px; }
        button { padding: 15px 30px; font-size: 20px; background: #238636; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* The Answer: Shrunk from 25vw to 12vw so it fits better */
        #result { 
            margin-top: 30px; 
            font-size: 12vw; 
            font-weight: 900; 
            display: block; 
            min-height: 100px; 
            text-transform: uppercase; 
        }

        #timer { font-size: 16px; color: #f85149; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>

    <h1>Ask me for it</h1>
    <p>go ahead</p>
    
    <input type="text" id="questionInput" placeholder=say it..>
    <br>
    <button onclick="decide()">beg</button>

    <div id="result"></div>
    <div id="timer"></div>

    <script>
        function decide() {
            const display = document.getElementById("result");
            const timerDisplay = document.getElementById("timer");
            const input = document.getElementById("questionInput").value.toLowerCase().trim();
            
            let count = parseInt(localStorage.getItem('askCount')) || 0;
            let lastReset = localStorage.getItem('lastResetTime');
            const now = new Date().getTime();
            const twentyFourHours = 24 * 60 * 60 * 1000;

            // Reset count if 24 hours passed
            if (lastReset && (now - lastReset) > twentyFourHours) {
                count = 0;
                localStorage.setItem('askCount', 0);
                timerDisplay.innerHTML = "";
            }

            // Limit Check with Countdown
            if (count >= 2) {
                const timeLeft = twentyFourHours - (now - lastReset);
                const hours = Math.floor(timeLeft / (1000 * 60 * 60));
                const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                
                display.innerHTML = '<span style="font-size: 6vw; color: #f85149;">LIMIT REACHED</span>';
                timerDisplay.innerHTML = "Come back in " + hours + "h " + minutes + "m";
                return;
            }
            

            if (input.includes("touch") || input.includes("cum")) {
                count++;
                localStorage.setItem('askCount', count);
                if (count === 1) {
                    localStorage.setItem('lastResetTime', now);
                }

                display.innerHTML = '<span style="font-size: 8vw; color: gray;">Checking...</span>';
                timerDisplay.innerHTML = "";
                
                setTimeout(function() {
                    const chance = Math.random() * 100;
                    if (chance <= 80) {
                        display.innerHTML = "NO";
                        if (navigator.vibrate) { navigator.vibrate(500); }
                    } else {
                        display.innerHTML = "YES";
                    }
                }, 3000); 

            } else {
                display.innerHTML = '<span style="font-size: 8vw;">Ask correctly.</span>';
            }
        }
    </script>

</body>
</html>
