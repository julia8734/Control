<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>it's not your decision</title>
    <style>
        body { text-align: center; font-family: sans-serif; padding: 20px; background: #0d1117; color: white; }
        input { padding: 15px; width: 80%; font-size: 20px; border-radius: 8px; border: 1px solid #30363d; background: #161b22; color: white; margin-bottom: 20px; }
        button { padding: 15px 30px; font-size: 20px; background: #238636; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #result { margin-top: 50px; font-size: 50vw; font-weight: 900; display: block; min-height: 150px; text-transform: uppercase; }
        .no { color: white; } 
        .yes { color: white; } 
    </style>
</head>
<body>

    <h1>Ask me.</h1>
    <p>you're not in control over this anymore</p>
    
    <input type="text" id="questionInput" placeholder=maybe..>
    <br>
    <button onclick="decide()">beg for it</button>

    <div id="result"></div>
<script>
    function decide() {
        // This popup will tell us if the button is even working
        console.log("Button clicked!"); 
        
        const display = document.getElementById("result");
        const inputField = document.getElementById("questionInput");
        const input = inputField.value.toLowerCase().trim();
        
        // 1. Storage Logic
        let count = parseInt(localStorage.getItem('askCount')) || 0;
        let lastReset = localStorage.getItem('lastResetTime');
        const now = new Date().getTime();
        const twentyFourHours = 24 * 60 * 60 * 1000;

        if (lastReset && (now - lastReset) > twentyFourHours) {
            count = 0;
            localStorage.setItem('askCount', 0);
        }

        if (count >= 2) {
            display.innerHTML = '<span style="font-size: 8vw; color: red;">Wait 24h.</span>';
            return;
        }

        // 2. LOOSER CHECK: Just looks for the word "smoke" or "drink"
        if (input.includes("touch") || input.includes("get off")) {
            count++;
            localStorage.setItem('askCount', count);
            if (count === 1) {
                localStorage.setItem('lastResetTime', now);
            }

            display.innerHTML = '<span style="font-size: 10vw; color: gray;">Checking...</span>';
            
            setTimeout(function() {
                const chance = Math.random() * 100;
                if (chance <= 80) {
                    display.innerHTML = '<span class="no" style="color:white;">NO</span>';
                    if (navigator.vibrate) { navigator.vibrate(500); }
                } else {
                    display.innerHTML = '<span class="yes" style="color:white;">YES</span>';
                }
            }, 3000); 

        } else {
            // If it doesn't recognize the words, it shows this
            display.innerHTML = '<span style="font-size: 10vw;">Word not recognized.</span>';
        }
    }
</script>

    

</body>
</html>
