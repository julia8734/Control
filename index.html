<!DOCTYPE html>
<html>
<head>
    <title>The 80/20 decider</title>
    <style>
        body { text-align: center; font-family: 'Segoe UI', sans-serif; padding: 50px; background: #0d1117; color: white; }
        input { padding: 24px; width: 80%; max-width: 400px; border-radius: 8px; border: 1px solid #30363d; background: #161b22; color: white; margin-bottom: 20px; }
        button { padding: 12px 24px; background: #238636; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #result { margin-top: 40px; font-size: 60px; font-weight: bold; }
        .no { color: #f85149; } /* black for No */
        .yes { color: #3fb950; } / * black for Yes */
    </style>
</head>
<body>

    <h1>Ask a Question</h1>
    <p>Try asking "Can I touch?" or "Can I cum?"</p>
    
    <input type="text" id="questionInput" placeholder="Ask for permission.">
    <br>
    <button onclick="decide()">beg for it</button>

    <div id="result"></div>

    <script>
        function decide() {
            const input = document.getElementById("questionInput").value.toLowerCase();
            const display = document.getElementById("result");
            
            // Define your two specific questions here
            const q1 = "can I touch?";
            const q2 = "can I cum?";

            if (input.includes(q1) || input.includes(q2)) {
                // Generate a number between 0 and 100
                const chance = Math.random() * 100;

                if (chance <= 80) {
                    display.innerHTML = '<span class="no">NO</span>';
                } else {
                    display.innerHTML = '<span class="yes">YES</span>';
                }
            } else {
                display.innerHTML = "Ask one of the two secret questions!";
                display.style.color = "gray";
            }
        }
    </script>

</body>
</html>
